server:
  port: 8081

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/pet_timeline?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_db_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.pettimeline.model.entity
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: ${JWT_SECRET:your-jwt-secret-must-be-at-least-24-characters}
    expiration: 604800000  # 7 days in ms
  upload:
    path: ${UPLOAD_PATH:./uploads}
  ai:
    zhipu:
      api-key: ${AI_API_KEY:sk-your-api-key}
      chat-model: ${AI_CHAT_MODEL:qwen3.5-omni-flash}
      vision-model: ${AI_VISION_MODEL:qwen3.5-omni-plus}
      embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-v3}
      base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/}
